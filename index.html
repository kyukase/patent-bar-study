<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patent Bar — Master Sheet</title>

<style>
/* ══ THEME SYSTEM ══════════════════════════════════════════════════════════ */
:root {
  --bg:        #080a18;
  --bg2:       #0c0e20;
  --bg3:       #0e1128;
  --surface:   rgba(255,255,255,.03);
  --surface2:  rgba(255,255,255,.045);
  --border:    rgba(255,255,255,.09);
  --border2:   rgba(255,255,255,.14);
  --text:      #d8dff5;
  --text2:     #8090b0;
  --text3:     #5a6a88;
  --topbar-bg: rgba(8,10,24,.97);
  --sidebar-bg:#0c0e20;
  --card-bg:   #0e1128;
  --overlay:   rgba(4,5,14,.88);
  --quiz-overlay: rgba(4,5,14,.93);
  --input-bg:  rgba(255,255,255,.07);
  --note-bg:   rgba(0,0,0,.35);
  --scrollbar: rgba(255,255,255,.12);
  --trap-bg:   rgba(255,50,50,.06);
  --trap-bdr:  rgba(255,80,80,.22);
  --hook-bg:   rgba(0,240,200,.05);
  --hook-bdr:  rgba(0,240,200,.18);
  --chip-mpep-bg:  rgba(120,140,200,.09);
  --chip-link-bg:  rgba(60,180,255,.08);
}

/* ── LIGHT THEME ── */
html[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #e4e8f2;
  --bg3:       #ffffff;
  --surface:   rgba(0,0,0,.03);
  --surface2:  rgba(0,0,0,.055);
  --border:    rgba(0,0,0,.1);
  --border2:   rgba(0,0,0,.15);
  --text:      #1a2040;
  --text2:     #4a5470;
  --text3:     #7a88a8;
  --topbar-bg: rgba(240,242,248,.97);
  --sidebar-bg:#e4e8f2;
  --card-bg:   #ffffff;
  --overlay:   rgba(220,225,240,.88);
  --quiz-overlay: rgba(200,208,230,.94);
  --input-bg:  rgba(0,0,0,.05);
  --note-bg:   rgba(0,0,0,.04);
  --scrollbar: rgba(0,0,0,.18);
  --trap-bg:   rgba(200,30,30,.05);
  --trap-bdr:  rgba(200,60,60,.2);
  --hook-bg:   rgba(0,160,130,.05);
  --hook-bdr:  rgba(0,180,150,.2);
  --chip-mpep-bg:  rgba(80,100,180,.08);
  --chip-link-bg:  rgba(20,130,220,.07);
}

/* ── SEPIA THEME ── */
html[data-theme="sepia"] {
  --bg:        #f5f0e8;
  --bg2:       #ede7d8;
  --bg3:       #faf6ee;
  --surface:   rgba(100,70,20,.04);
  --surface2:  rgba(100,70,20,.07);
  --border:    rgba(100,70,20,.14);
  --border2:   rgba(100,70,20,.2);
  --text:      #2d2010;
  --text2:     #6b5030;
  --text3:     #9a8060;
  --topbar-bg: rgba(245,240,232,.97);
  --sidebar-bg:#ede7d8;
  --card-bg:   #faf6ee;
  --overlay:   rgba(230,220,200,.88);
  --quiz-overlay: rgba(225,215,195,.94);
  --input-bg:  rgba(100,70,20,.06);
  --note-bg:   rgba(100,70,20,.05);
  --scrollbar: rgba(100,70,20,.2);
  --trap-bg:   rgba(180,60,20,.05);
  --trap-bdr:  rgba(180,70,20,.2);
  --hook-bg:   rgba(20,120,90,.05);
  --hook-bdr:  rgba(20,130,100,.18);
  --chip-mpep-bg:  rgba(100,80,30,.08);
  --chip-link-bg:  rgba(30,100,60,.07);
}

/* ── DARK-IMPROVED THEME ── */
html[data-theme="dark"] {
  --bg:        #13151f;
  --bg2:       #1a1d2c;
  --bg3:       #1f2235;
  --surface:   rgba(255,255,255,.04);
  --surface2:  rgba(255,255,255,.07);
  --border:    rgba(255,255,255,.1);
  --border2:   rgba(255,255,255,.17);
  --text:      #dde4f5;
  --text2:     #8a9ab8;
  --text3:     #5a6a88;
  --topbar-bg: rgba(19,21,31,.98);
  --sidebar-bg:#1a1d2c;
  --card-bg:   #1f2235;
  --overlay:   rgba(8,10,20,.86);
  --quiz-overlay: rgba(10,12,22,.92);
  --input-bg:  rgba(255,255,255,.07);
  --note-bg:   rgba(0,0,0,.3);
  --scrollbar: rgba(255,255,255,.15);
  --trap-bg:   rgba(255,60,60,.07);
  --trap-bdr:  rgba(255,90,90,.25);
  --hook-bg:   rgba(0,240,200,.06);
  --hook-bdr:  rgba(0,240,200,.2);
  --chip-mpep-bg:  rgba(120,140,200,.1);
  --chip-link-bg:  rgba(60,180,255,.09);
}

/* theme switcher buttons */
.theme-switcher{position:relative;display:flex;align-items:center}
.theme-toggle-btn{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;color:var(--text2)}
.theme-toggle-btn:hover{background:var(--surface2);border-color:var(--border2)}
.theme-dots-panel{display:none;position:absolute;top:38px;right:0;background:var(--card-bg);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;gap:8px;flex-direction:column;z-index:500;min-width:130px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.theme-dots-panel.open{display:flex}
.theme-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .12s}
.theme-row:hover{background:var(--surface2)}
.theme-dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-dot.active{border-color:#7c83ff;box-shadow:0 0 0 2px rgba(124,131,255,.3)}
.theme-dot[data-t="default"]{background:radial-gradient(circle at 35% 35%,#1a2040,#080a18)}
.theme-dot[data-t="dark"]{background:radial-gradient(circle at 35% 35%,#2a2f48,#13151f)}
.theme-dot[data-t="light"]{background:radial-gradient(circle at 35% 35%,#e4e8f8,#f0f2f8)}
.theme-dot[data-t="sepia"]{background:radial-gradient(circle at 35% 35%,#d8c8a8,#f5f0e8)}
.theme-row-label{font-size:12px;color:var(--text2);font-weight:500}
/* ══════════════════════════════════════════════════════════════════════════ */

/* ─────────────────────────────────────────────
   HOW TO ADD / EDIT CONTENT
   ─────────────────────────────────────────────
   All content lives in the BUCKETS array below.
   Each bucket has an array of "topics".
   Each topic has:
     title    — shown in header
     yield    — "very-high" | "high" | "moderate" | "low"
     rule     — main rule text (always visible)
     details  — array of strings shown in expandable panel
     traps    — array of strings shown in red trap boxes
     hooks    — array of strings shown in blue memory boxes
     mpep     — array of MPEP citation strings
     connects — array of connection strings
     notes    — your personal notes (string, leave "" if none)
   ───────────────────────────────────────────── */

*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP */
.topbar{flex-shrink:0;background:var(--topbar-bg);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:700;color:#c8dcff;white-space:nowrap}
.sb-toggle{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#b0c0e0;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0;transition:background .15s,color .15s}
.sb-toggle:hover{background:rgba(255,255,255,.13);color:#fff}
.search-wrap{flex:1;max-width:340px}
.search{width:100%;background:var(--input-bg);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 12px;font-size:14px;outline:none}
.search:focus{border-color:rgba(74,127,255,.5);background:rgba(74,127,255,.07)}
.search::placeholder{color:#5a6a88}
.prog-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:#6a7a98}
.pbar{width:110px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#4a7fff,#a855f7,#10b981);transition:width .4s}
.pcount{color:var(--text2);font-weight:700}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;transition:width .2s ease,opacity .2s ease}
.sidebar.collapsed{width:0;opacity:0;overflow:hidden}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.sb-btn{width:100%;text-align:left;padding:9px 15px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;display:flex;flex-direction:column;gap:3px;border-left:3px solid transparent;transition:all .15s;line-height:1.35}
.sb-btn:hover{color:var(--text);background:var(--surface2)}
.sb-btn.active{color:var(--text);background:rgba(74,127,255,.12);border-left-color:#5a8fff;font-weight:600}
.sb-num{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.sb-btn.active .sb-num{color:#6a90c0}
.sb-btn:hover .sb-num{color:#7a8ab0}
.sb-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 10px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px 24px}
.main::-webkit-scrollbar{width:6px}.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* BUCKET HEADER */
.bkt-header{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.08)}
.bkt-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.bkt-sub{font-size:14px;color:var(--text2);margin-bottom:6px}
.bkt-mpep{font-size:12.5px;color:var(--text3);font-style:italic}

/* TOPICS GRID */
.topics{column-count:3;column-gap:12px;column-fill:balance}
.topic{break-inside:avoid;margin-bottom:12px;display:inline-block;width:100%}
@media(max-width:1100px){.topics{column-count:2}}
@media(max-width:680px){.topics{column-count:1}}

/* TOPIC CARD */
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.topic{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;animation:cardIn .25s ease both;position:relative}
.topic:hover{border-color:var(--border2);background:var(--surface2)}
.topic-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.topic-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.yield{font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.yield.very-high{background:rgba(255,50,50,.18);color:#ff5f5f;border:1px solid rgba(255,80,80,.45);text-shadow:0 0 8px rgba(255,80,80,.4)}
.yield.high{background:rgba(255,180,0,.15);color:#ffcc30;border:1px solid rgba(255,190,0,.4);text-shadow:0 0 8px rgba(255,200,0,.35)}
.yield.moderate{background:rgba(60,130,255,.16);color:#70c8ff;border:1px solid rgba(80,160,255,.35)}
.yield.low{background:rgba(120,130,160,.11);color:#8898b8;border:1px solid rgba(120,130,160,.22)}

.rule{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:0}
.rule p{margin-bottom:10px}.rule p:last-child{margin-bottom:0}

/* EXPAND TOGGLE */
.toggle{display:flex;align-items:center;gap:6px;margin-top:11px;cursor:pointer;font-size:13px;color:#5a80aa;padding:5px 8px;border-radius:5px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);user-select:none;transition:all .15s;font-weight:500}
.toggle:hover{color:#90c0e8;background:rgba(74,127,255,.08);border-color:rgba(74,127,255,.2)}
.toggle-arrow{font-size:10px;transition:transform .2s}
.topic.open .toggle-arrow{transform:rotate(90deg)}
.topic.open .toggle{color:#7ab8e8;background:rgba(74,127,255,.1);border-color:rgba(74,127,255,.25)}

/* DETAILS PANEL */
.details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.07)}
.topic.open .details{display:block}

/* ITEMS — single bullet via CSS only */
.det-item{display:flex;gap:8px;font-size:13.5px;color:#8898ba;line-height:1.68;margin-bottom:7px}
.det-item::before{content:'▸';flex-shrink:0;color:#3a6090;margin-top:1px;font-size:12px;line-height:1.6}
.det-item strong{color:#b0cce8;font-weight:600}
.det-item em{font-style:normal;color:#5a9acc}

/* TRAP */
@keyframes glow{0%,100%{box-shadow:none}60%{box-shadow:0 0 0 3px rgba(255,60,60,.07)}}
.trap{margin-top:9px;padding:10px 13px 10px 16px;background:var(--trap-bg);border:1px solid var(--trap-bdr);border-radius:6px;font-size:13.5px;color:#e07878;line-height:1.68;position:relative;animation:glow 4.5s ease infinite}
.trap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(#ff4444,#990000);border-radius:3px 0 0 3px}
.trap strong{color:#ff7070;font-weight:700}

/* HOOK */
.hook{margin-top:8px;padding:10px 13px;background:var(--hook-bg);border:1px solid var(--hook-bdr);border-radius:6px;font-size:13.5px;color:#40d4b8;line-height:1.68}
.hook strong{color:#60ffe0;font-weight:700;text-shadow:0 0 8px rgba(0,255,200,.2)}

/* INLINE COMPARISON TABLE */
.cmp{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border-radius:7px;overflow:hidden}
.cmp th{padding:7px 11px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:left}
.cmp td{padding:8px 11px;border-top:1px solid rgba(255,255,255,.06);line-height:1.5;vertical-align:top}
.cmp tr:hover td{background:rgba(255,255,255,.025)}
.cmp .th-row{background:rgba(255,255,255,.05)}
.cmp .col-a{color:#7df9e8;font-weight:600}
.cmp .col-b{color:#ff9de2;font-weight:600}
.cmp .col-c{color:#ffe566;font-weight:600}
.cmp .col-g{color:#7aff9a;font-weight:600}
.cmp td.y{color:#5dde8a}.cmp td.n{color:#ff6b6b}.cmp td.p{color:#ffc94d}

/* CHIPS ROW */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:12px;padding:3px 10px;border-radius:4px;border:1px solid;cursor:default}
.chip.mpep{background:var(--chip-mpep-bg);border-color:rgba(120,140,200,.22);color:#8098c8}
.chip.link{background:var(--chip-link-bg);border-color:rgba(60,180,255,.22);color:#60c0ff}

/* NOTES */
.notes-section{margin-top:11px}
.notes-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;color:#4a6080;font-weight:700;margin-bottom:5px}
.notes-box{width:100%;background:var(--note-bg);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:13.5px;padding:8px 11px;resize:vertical;min-height:56px;font-family:inherit;line-height:1.65;outline:none;transition:border-color .15s}
.notes-box:focus{border-color:rgba(60,180,255,.4);background:rgba(60,180,255,.04)}
.notes-box::placeholder{color:#2a3a52}

/* FOCUS BUTTON on each card */
.focus-btn{background:none;border:1px solid var(--border);color:var(--text3);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .15s;margin-left:4px}
.focus-btn:hover{background:rgba(74,127,255,.15);border-color:rgba(74,127,255,.4);color:#90c0ff}
.focus-btn title{display:none}

/* FOCUS OVERLAY */
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes spotIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
#focusOverlay{display:none;position:fixed;inset:0;z-index:999;background:var(--overlay);backdrop-filter:blur(6px);overflow-y:auto;padding:32px 20px;animation:overlayIn .2s ease}
#focusOverlay.visible{display:flex;align-items:flex-start;justify-content:center}
.focus-card{background:var(--card-bg);border:1px solid var(--border2);border-radius:14px;padding:28px 32px;max-width:780px;width:100%;animation:spotIn .22s ease;position:relative;margin:auto}
.focus-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#9ab0cc;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s}
.focus-close:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#f08080}
.focus-card .topic-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3;padding-right:36px}
.focus-card .yield{font-size:11px;padding:4px 12px;margin-bottom:14px;display:inline-flex}
.focus-card .rule{font-size:15.5px;color:var(--text2);line-height:1.75;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.07)}
.focus-card .det-item{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.focus-card .det-item:last-of-type{border-bottom:none}
.focus-card .trap{font-size:14px;color:#e07878;padding:10px 14px 10px 17px;margin-top:10px}
.focus-card .hook{font-size:14px;color:#40d4b8;padding:10px 14px;margin-top:10px}
.focus-card .cmp{font-size:14px}
.focus-card .chips{margin-top:12px;gap:6px}
.focus-card .chip{font-size:12.5px;padding:4px 12px}
.focus-card .notes-section{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07)}
.focus-card .notes-label{font-size:11.5px;margin-bottom:6px}
.focus-card .notes-box{font-size:14px;min-height:80px;padding:10px 14px}
.focus-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07)}

/* Flag system */

.focus-nav-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#9ab0cc;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.focus-nav-btn:hover{background:rgba(74,127,255,.15);border-color:rgba(74,127,255,.35);color:#90c0ff}
.focus-nav-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.focus-nav-counter{font-size:12px;color:#3a4a62}

/* SEARCH HIT HIGHLIGHT */
.topic.hidden{display:none}
mark{background:rgba(245,158,11,.25);color:#fbbf24;border-radius:2px;padding:0 1px}

/* NO RESULTS */
.no-results{text-align:center;padding:40px;color:#2a3a50;font-size:13px}

/* ══════════════════ QUIZ MODE ══════════════════ */
.quiz-btn{background:rgba(124,131,255,.15);border:1px solid rgba(124,131,255,.35);color:#b0b8ff;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.quiz-btn:hover{background:rgba(124,131,255,.28);color:#d0d8ff}
.quiz-btn.active{background:rgba(124,131,255,.3);border-color:#7c83ff;color:#fff}

/* overlay */
#quizOverlay{display:none;position:fixed;inset:0;z-index:1100;background:var(--quiz-overlay);backdrop-filter:blur(8px);overflow:hidden}
#quizOverlay.visible{display:flex;align-items:center;justify-content:center;padding:56px 16px 24px}

/* progress header */
.qz-header{display:none}
.qz-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#9ab0cc;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0;transition:all .15s}
.qz-close:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#f08080}
.qz-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.qz-prog-text{font-size:12px;color:#5a7090}
.qz-pbar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.qz-pfill{height:100%;background:linear-gradient(90deg,#4a7fff,#a855f7);transition:width .3s;border-radius:3px}

/* card */
.qz-card{background:#1a1d2c;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:40px 44px;max-width:860px;width:calc(100% - 48px);position:absolute;box-shadow:0 12px 48px rgba(0,0,0,.4);cursor:grab;user-select:none}.qz-card:active{cursor:grabbing}
.qz-topic-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#5a7090;font-weight:700;margin-bottom:10px}
.qz-yield{display:inline-flex;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.qz-sentence{font-size:22px;color:#dde4f5;line-height:1.85;margin-bottom:28px;font-weight:500}
.qz-blank{display:inline-block;border-bottom:2px solid #7c83ff;min-width:110px;height:1.4em;vertical-align:middle;cursor:pointer;transition:all .2s;margin:0 4px}
.qz-blank.revealed{border-bottom-color:#7df9e8;background:rgba(0,240,200,.08);border-radius:4px;color:#7df9e8;font-weight:700;padding:2px 8px;height:auto;vertical-align:baseline}

/* reveal btn */
.qz-reveal-btn{background:rgba(124,131,255,.15);border:1px solid rgba(124,131,255,.3);color:#7c83ff;border-radius:8px;padding:14px 24px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;margin-bottom:20px}
.qz-reveal-btn:hover{background:rgba(124,131,255,.25);color:#d0d8ff}
.qz-reveal-btn:disabled{opacity:.4;cursor:default}

/* answer area */
.qz-answer-area{display:none;margin-bottom:20px}
.qz-answer-area.show{display:block}
.qz-answer-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5a7090;font-weight:700;margin-bottom:6px}
.qz-answer-text{font-size:16px;color:#7df9e8;font-weight:700;padding:10px 14px;background:rgba(0,240,200,.06);border:1px solid rgba(0,240,200,.2);border-radius:8px;margin-bottom:12px}
.qz-context{font-size:13px;color:#6a8098;line-height:1.6;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:6px;border-left:3px solid #2a4060}

/* rating buttons */
.qz-ratings{display:none;grid-template-columns:1fr 1fr 1fr;gap:8px}
.qz-ratings.show{display:grid}
.qz-rate{border:none;border-radius:10px;padding:16px 8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.qz-rate .rate-icon{font-size:26px}
.qz-rate .rate-label{font-size:13px;letter-spacing:.5px;text-transform:uppercase}
.qz-rate .rate-sub{font-size:10px;opacity:.7}
.qz-rate.again{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
.qz-rate.again:hover{background:rgba(239,68,68,.25)}
.qz-rate.hard{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.28);color:#fbbf24}
.qz-rate.hard:hover{background:rgba(245,158,11,.22)}
.qz-rate.good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.qz-rate.good:hover{background:rgba(34,197,94,.2)}

/* due counter */
.due-badge{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.35);color:#f87171;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;display:none}
.due-badge.show{display:inline}

/* summary screen */
.qz-summary{background:#1a1d2c;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:48px 44px;max-width:860px;width:calc(100% - 48px);text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.4);position:absolute;cursor:grab;user-select:none}.qz-summary:active{cursor:grabbing}
.qz-summary h2{font-size:22px;font-weight:700;color:#dde4f5;margin-bottom:8px}
.qz-summary .sum-stat{font-size:42px;font-weight:800;color:#4ade80;margin:16px 0 4px}
.qz-summary .sum-sub{font-size:14px;color:#5a6a88;margin-bottom:24px}
.qz-sum-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.qz-sum-bar{background:rgba(255,255,255,.05);border-radius:8px;padding:14px 10px;text-align:center}
.qz-sum-bar .bar-n{font-size:26px;font-weight:800;margin-bottom:4px}
.qz-sum-bar .bar-l{font-size:11px;color:#5a7090;text-transform:uppercase;letter-spacing:.5px}
.again-n{color:#f87171}.hard-n{color:#fbbf24}.good-n{color:#4ade80}
.qz-restart{background:#7c83ff;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-right:10px}
.qz-restart:hover{background:#9499ff}
.qz-restart-due{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#f87171;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.qz-restart-due:hover{background:rgba(239,68,68,.35)}


/* Quiz topbar bar — shown when quiz is active */
.qz-topbar{display:none;position:fixed;top:0;left:0;right:0;z-index:1200;background:#0e1020;border-bottom:2px solid rgba(124,131,255,.3);padding:0 20px;height:46px;align-items:center;gap:16px;backdrop-filter:blur(8px)}
.qz-topbar.visible{display:flex}
.qz-topbar .qz-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#9ab0cc;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:all .15s}
.qz-topbar .qz-close:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#f08080}
.qz-topbar .qz-title{font-size:13px;font-weight:700;color:#c0ccee;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qz-topbar .qz-prog-text{font-size:12px;color:#5a7090;white-space:nowrap;flex-shrink:0}
.qz-topbar .qz-pbar{width:120px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;flex-shrink:0}
.qz-topbar .qz-pfill{height:100%;background:linear-gradient(90deg,#4a7fff,#a855f7);transition:width .3s;border-radius:2px}

.qz-topbar .qz-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#9ab0cc;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:all .15s}
.qz-topbar .qz-close:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#f08080}
.qz-topbar .qz-title{font-size:13px;font-weight:700;color:#c0ccee;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qz-topbar .qz-prog-text{font-size:12px;color:#5a7090;white-space:nowrap;flex-shrink:0}
.qz-topbar .qz-pbar{width:120px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;flex-shrink:0}
.qz-topbar .qz-pfill{height:100%;background:linear-gradient(90deg,#4a7fff,#a855f7);transition:width .3s;border-radius:2px}

</style>

          ["Oath required?", "❌ No", "✅ Yes"],

          ["Can mature into patent?", "❌ No", "✅ Yes"],
          ["Examination?", "❌ None", "✅ Full prosecution"]
        ]
      },
      traps: ["Provisional expires at 12 months — no extension. If you miss the window to file a nonprovisional, you lose the priority date."],
      hooks: ["<strong>Provisional = parking spot</strong> for your priority date. You still have to move the car within 12 months."],
      mpep: ["MPEP 201.04", "MPEP 211"],

      title: "Missing Parts",

      rule: "If oath or fees missing → Notice to File Missing Parts. Period set (usually 2 months), extendable under 1.136(a). Absolute cap: 6 months from mailing. Failure to respond → abandonment.",

      hooks: [],

      yield: "high",

      details: [
        "ADS supplies inventor name/address — oath doesn't need to repeat that",

      traps: [],
      hooks: ["ADS = WHO · Oath = WHAT THEY SWEAR"],
      mpep: ["MPEP 602"],

    {

      details: [

      ],
      traps: [],
      hooks: ["ADS = WHO · Spec = WHAT IS DISCLOSED · Claims = SCOPE"],
      mpep: ["MPEP 601.05"],
      connects: ["Oath", "Priority Claims", "Inventorship"],
      notes: ""
    },
    {
      title: "Inventorship Correction (1.48)",
      yield: "moderate",
      rule: "Incorrect inventorship can be corrected if: (1) error occurred without deceptive intent. Can add or remove inventors at any time before patent issues.",
      details: [
        "File corrected ADS + 1.48 request",
        "No deceptive intent is the key requirement",
        "All remaining inventors must still execute oath/declaration"
      ],
      traps: ["Wrong inventor in ADS → corrected ADS. Inventor omitted entirely → formal 1.48 correction."],
      hooks: [],
      mpep: ["MPEP 602.01"],
      connects: ["Oath", "ADS"],
      notes: ""
    },
    {
      title: "Small / Micro Entity Status",
      yield: "moderate",
      rule: "Small entity status asserted by paying small entity fee — no separate declaration required. Must still qualify (no large entity assignment). Error correctable if good faith + pay deficiency + petition.",
      details: [
        "Small entity: independent inventor, small business (<500 employees), nonprofit",
        "Micro entity: income limits + prior filing limits (≤4 prior filings, income ≤3× median household)",
        "Status must be valid at time of EACH payment",
        "Patent not automatically invalid if wrong status paid in good faith"
      ],
      traps: ["Paying small entity fee when not qualified = error, but correctable in good faith. Cannot retroactively claim discount if you forgot to assert it."],
      hooks: [],
      mpep: ["MPEP 509"],
      connects: ["Fees", "Track One"],
      notes: ""
    },
    {
      title: "Abandonment",
      yield: "high",
      rule: "Application abandoned if: no timely and complete reply, failure to pay issue fee, or failure to respond to Missing Parts. Revival possible if delay was unintentional.",
      details: [
        "Revival under 37 CFR 1.137 — must petition + pay fee + show unintentional delay",
        "Revival is not automatic",
        "Express abandonment also possible (file written statement)"
      ],
      traps: ["A partial reply (ignoring one rejection) = incomplete = abandonment."],
      hooks: [],
      mpep: ["MPEP 711"],
      connects: ["Revival", "Extensions", "Missing Parts", "Reply Requirements"],
      notes: ""
    },

      title: "New Matter (§132)",
      yield: "high",
      rule: "Cannot add new matter to spec after filing. If attempted: amendment not entered. To include new matter → file CIP. Unsupported claim ≠ new matter.",
      details: [
        "New matter = disclosure not supported by original spec",
        "If claim lacks spec support → §112(a) WD rejection (NOT §132)",

      hooks: ["Claim without support = §112(a). Adding to spec = §132."],

{
  num: 2, title: "Claim Interpretation", mpep: "MPEP 2111",

  topics: [
    {
      title: "Broadest Reasonable Interpretation (BRI)",
      yield: "very-high",
      rule: "During prosecution, claims get their broadest reasonable interpretation consistent with the specification. NOT the broadest possible, NOT the narrowest, NOT how the inventor privately intended it.",
      details: [

        "After issuance, district courts use Phillips standard (narrower)"

      traps: ["BRI ≠ broadest possible interpretation. It must be reasonable. Courts don't use BRI — only USPTO during prosecution."],
      hooks: [],
      mpep: ["MPEP 2111"],
      connects: ["§102 Anticipation", "§103 Obviousness", "Lexicographer Rule"],
      notes: ""

      yield: "very-high",
      rule: "If the spec clearly sets forth a definition with clear intent to define, that definition controls — overrides BRI ordinary meaning. Requirements: clear intent to define + explicit definitional language.",
      details: [

      traps: ["The spec must clearly express intent to define. Merely using a word differently once doesn't create a lexicographic definition."],
      hooks: ["If the spec defines it, USE THAT DEFINITION — ignore ordinary meaning."],
      mpep: ["MPEP 2111.01"],
      connects: ["BRI", "§102", "Indefiniteness §112(b)"],
      notes: ""
    },

      details: [

      traps: [],
      hooks: ["Open = comprising (extra stuff OK) · Closed = consisting of (exact match only)"],

{
  num: 3, title: "§102 Anticipation", mpep: "MPEP 2100",

function applySearch(q){
  q = q.trim().toLowerCase();
  const cards = document.querySelectorAll('.topic');
  let visible=0;
  cards.forEach(card=>{
    if(!q){ card.classList.remove('hidden'); visible++; return; }
    const text = card.textContent.toLowerCase();
    if(text.includes(q)){ card.classList.remove('hidden'); visible++; }
    else card.classList.add('hidden');
  });
  const nr = document.getElementById('no-results');
  if(nr) nr.style.display = (visible===0 && q) ? 'block' : 'none';
}

function renderTable(tbl){
  // tbl = { heads: ['A','B','C'], colClass:['col-a','col-b','col-c'], rows: [['label','val1','val2'],...] }
  let h = `<table class="cmp"><thead><tr class="th-row">`;
  tbl.heads.forEach((hd,i)=>{ h+=`<th class="${(tbl.colClass||[])[i]||''}">${hd}</th>`; });
  h+=`</tr></thead><tbody>`;
  tbl.rows.forEach(row=>{
    h+=`<tr>`;
    row.forEach((cell,i)=>{ h+=`<td class="${(tbl.cellClass&&tbl.cellClass[row.indexOf?.[i]||i])||''}">${cell}</td>`; });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

// SRS scheduling constants (intervals in hours)
const SRS_AGAIN = 1;      // 1 hour — review later, not this session
const SRS_HARD  = 12;     // 12 hours
const SRS_GOOD  = 48;     // 2 days

// Storage key for SRS state
function srsKey(bIdx, tIdx, clozeIdx) { return `srs_${bIdx}_${tIdx}_${clozeIdx}`; }

// Load SRS record
function loadSRS(key) {
  try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
}
function saveSRS(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// Generate cloze cards from a topic
function makeClozeCards(t, bIdx, tIdx) {
  const cards = [];
  // Strip HTML tags from rule text for processing
  const ruleRaw = t.rule.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();

  // Key phrases to blank — ordered by importance
  const keyPhrases = extractKeyPhrases(ruleRaw, t);

  keyPhrases.forEach((phrase, ci) => {
    if (!phrase || phrase.length < 3) return;
    // Build sentence with blank — replace ALL occurrences so answer can't be inferred from context
    const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const blanked = ruleRaw.replace(new RegExp(escaped, 'gi'), '▓'.repeat(phrase.length));
    cards.push({
      bIdx, tIdx, clozeIdx: ci,
      topicTitle: t.title,
      yield: t.yield,
      sentence: blanked,
      answer: phrase,
      fullRule: ruleRaw,
      trap: t.traps[0] || '',
      hook: t.hooks[0] || '',
      srsKey: srsKey(bIdx, tIdx, ci)
    });
  });
  return cards;
}

// Extract the most meaningful phrases to test
function extractKeyPhrases(text, t) {
  const phrases = [];

  // Strategy 1: Numbers and time periods (very testable)
  const nums = text.match(/\b\d+[\s-]?months?\b|\b\d+[\s-]?years?\b|\b\d+[\s-]?days?\b|\b\d[\s.]\d+\b|\b\d{1,2} months\b/gi) || [];
  nums.forEach(n => { if (!phrases.includes(n)) phrases.push(n); });

  // Strategy 2: ALL-CAPS or bold-implied key terms (NOT, MUST, CANNOT etc)
  const caps = text.match(/\bNOT\b|\bMUST\b|\bCANNOT\b|\bNEVER\b|\bONLY\b|\bALL\b/g) || [];
  // skip these — too short, pick the phrase around them instead

  // Strategy 3: Key legal terms and proper nouns
  const legalTerms = [
    'broadest reasonable interpretation', 'undue experimentation',
    'written description', 'best mode', 'effective filing date',
    'prima facie', 'PHOSITA', 'one of ordinary skill',
    'reasonable certainty', 'necessarily present',
    'reasonable expectation of success', 'commensurate in scope',
    'first inventor to file', 'first to invent',
    'terminal disclaimer', 'safe harbor', 'double patenting',
    'inequitable conduct', 'deceptive intent',
    'new matter', 'common ownership',
    'notice of appeal', 'appeal brief',
    'national stage', 'priority date',
    'ex parte', 'inter partes',
    'specification', 'oath', 'declaration',
    'continuation-in-part', 'divisional',
    'request for continued examination',
    'provisional', 'nonprovisional',
    'anticipation', 'obviousness',
    'abstract idea', 'law of nature', 'natural phenomenon',
    'significantly more', 'judicial exception',
    'means-plus-function', 'corresponding structure',
    'comprising', 'consisting of', 'consisting essentially of',
    'teaching away', 'nexus', 'commercial success',
    'long-felt need', 'unexpected results'
  ];
  legalTerms.forEach(term => {
    if (text.toLowerCase().includes(term.toLowerCase())) {
      // Find actual case in text
      const idx = text.toLowerCase().indexOf(term.toLowerCase());
      const actual = text.substring(idx, idx + term.length);
      if (!phrases.includes(actual)) phrases.push(actual);
    }
  });

  // Strategy 4: Parenthetical section numbers
  const sections = text.match(/§\s*\d+[\w().]*/g) || [];
  sections.forEach(s => { if (!phrases.includes(s)) phrases.push(s); });

  // Strategy 5: CFR rule numbers
  const rules = text.match(/\b1\.\d+[a-z]?\b/g) || [];
  rules.forEach(r => { if (!phrases.includes(r)) phrases.push(r); });

  // Limit to 3 most important per topic to avoid fatigue
  return phrases.slice(0, 3);
}

// Quiz state
let qzDeck = [];
let qzIndex = 0;
let qzStats = { again: 0, hard: 0, good: 0 };
let qzRevealed = false;
let qzMode = 'all'; // 'all' | 'due' | 'wrong'
let qzSessionActive = false; // true once a quiz has been started this page load

// ── Session persistence ──────────────────────────────────────────────────────
function sessionKey(mode, bIdx) { return `qz_session_b${bIdx}_${mode}`; }

function saveSession() {
  try {
    localStorage.setItem(sessionKey(qzMode, activeBucket), JSON.stringify({
      deck: qzDeck, index: qzIndex, stats: qzStats,
      mode: qzMode, bucket: activeBucket, savedAt: Date.now()
    }));
  } catch(e) {}
}

function loadSession(mode, bIdx) {
  try {
    const raw = localStorage.getItem(sessionKey(mode, bIdx));
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() - s.savedAt > 86400000) { localStorage.removeItem(sessionKey(mode, bIdx)); return null; }
    if (s.index >= s.deck.length) { localStorage.removeItem(sessionKey(mode, bIdx)); return null; }
    return s;
  } catch(e) { return null; }
}

function clearSession(mode, bIdx) {
  try { localStorage.removeItem(sessionKey(mode, bIdx)); } catch(e) {}
}
// ────────────────────────────────────────────────────────────────────────────

function startQuiz(mode) {
  qzMode = mode || 'all';

  // Wrong-card quiz never resumes (always fresh from current state)
  if (qzMode !== 'wrong') {
    const saved = loadSession(qzMode, activeBucket);
    if (saved) {
      // If quiz was already active this session, resume silently without confirm
      if (qzSessionActive && qzDeck.length > 0) {
        openQuizOverlay();
        renderQuizCard();
        return;
      }
      // Only show confirm on fresh page load
      const remaining = saved.deck.length - saved.index;
      const resume = confirm(`Quiz in progress — ${remaining} card${remaining !== 1 ? 's' : ''} left.\n\nResume where you left off?`);
      if (resume) {
        qzDeck = saved.deck;
        qzIndex = saved.index;
        qzStats = saved.stats;
        qzSessionActive = true;
        openQuizOverlay();
        renderQuizCard();
        return;
      } else {
        clearSession(qzMode, activeBucket);
      }
    }
  }

  const b = BUCKETS[activeBucket];
  let allCards = [];
  b.topics.forEach((t, ti) => {
    allCards = allCards.concat(makeClozeCards(t, activeBucket, ti));
  });

  if (qzMode === 'due') {
    const now = Date.now();
    allCards = allCards.filter(c => {
      const srs = loadSRS(c.srsKey);
      if (!srs) return true;
      return now >= srs.nextDue;
    });
  }

  // Shuffle
  for (let i = allCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
  }

  qzDeck = allCards;
  qzIndex = 0;
  qzStats = { again: 0, hard: 0, good: 0 };

  if (qzDeck.length === 0) {
    openQuizOverlay();
    document.getElementById('qzBody').innerHTML = `
      <div class="qz-summary">
        <h2>Nothing due right now</h2>
        <p style="color:#5a6a88;margin-top:12px">All cards in this bucket are scheduled for later.</p>
        <button class="qz-restart" style="margin-top:24px" onclick="startQuiz('all')">Study All Cards Instead</button>
      </div>`;
    return;
  }

  saveSession();
  qzSessionActive = true;
  openQuizOverlay();
  renderQuizCard();
}

function openQuizOverlay() {
  const ov = document.getElementById('quizOverlay');
  ov.classList.add('visible');
  document.getElementById('qzTopbar').classList.add('visible');
  document.body.style.overflow = 'hidden';
  document.getElementById('quizBtn').classList.add('active');
  // Reset card position when opening fresh
  qzCardX = null; qzCardY = null;
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('visible');
  document.getElementById('qzTopbar').classList.remove('visible');
  document.body.style.overflow = '';
  document.getElementById('quizBtn').classList.remove('active');
  document.getElementById('wrongBtn').classList.remove('active');
  // Keep qzDeck/qzIndex in memory — reopening will resume silently this session
  updateDueBadge();
  updateWrongBadge();
}

// ── Draggable card state ─────────────────────────────────────────────────────
let qzCardX = null;
let qzCardY = null;
let qzDragging = false;
let qzDragStartX = 0;
let qzDragStartY = 0;
let qzDragCardX = 0;
let qzDragCardY = 0;

function initDrag(card) {
  if (!card) return;
  const ov = document.getElementById('quizOverlay');
  const ovRect = ov.getBoundingClientRect();

  // Position card: use saved position or center it
  if (qzCardX === null) {
    const cardW = card.offsetWidth || 860;
    const cardH = card.offsetHeight || 400;
    qzCardX = Math.max(0, (ovRect.width - cardW) / 2);
    qzCardY = Math.max(0, (ovRect.height - cardH) / 2 - 20);
  }
  card.style.left = qzCardX + 'px';
  card.style.top = qzCardY + 'px';

  card.addEventListener('mousedown', onDragStart);
  card.addEventListener('touchstart', onDragStartTouch, { passive: true });
}

function onDragStart(e) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  qzDragging = true;
  const card = e.currentTarget;
  qzDragStartX = e.clientX;
  qzDragStartY = e.clientY;
  qzDragCardX = parseFloat(card.style.left) || 0;
  qzDragCardY = parseFloat(card.style.top) || 0;
  card.style.transition = 'none';
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
}

function onDragStartTouch(e) {
  if (e.target.tagName === 'BUTTON') return;
  const t = e.touches[0];
  qzDragging = true;
  const card = e.currentTarget;
  qzDragStartX = t.clientX;
  qzDragStartY = t.clientY;
  qzDragCardX = parseFloat(card.style.left) || 0;
  qzDragCardY = parseFloat(card.style.top) || 0;
  document.addEventListener('touchmove', onDragMoveTouch, { passive: false });
  document.addEventListener('touchend', onDragEndTouch);
}

function onDragMove(e) {
  if (!qzDragging) return;
  moveCard(e.clientX, e.clientY);
}

function onDragMoveTouch(e) {
  if (!qzDragging) return;
  e.preventDefault();
  moveCard(e.touches[0].clientX, e.touches[0].clientY);
}

function moveCard(cx, cy) {
  const ov = document.getElementById('quizOverlay');
  const card = ov.querySelector('.qz-card, .qz-summary');
  if (!card) return;
  const ovRect = ov.getBoundingClientRect();
  const dx = cx - qzDragStartX;
  const dy = cy - qzDragStartY;
  const newX = Math.max(0, Math.min(ovRect.width - card.offsetWidth, qzDragCardX + dx));
  const newY = Math.max(0, Math.min(ovRect.height - card.offsetHeight, qzDragCardY + dy));
  qzCardX = newX;
  qzCardY = newY;
  card.style.left = newX + 'px';
  card.style.top = newY + 'px';
}

function onDragEnd() {
  qzDragging = false;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
}

function onDragEndTouch() {
  qzDragging = false;
  document.removeEventListener('touchmove', onDragMoveTouch);
  document.removeEventListener('touchend', onDragEndTouch);
}
// ────────────────────────────────────────────────────────────────────────────

function renderQuizCard() {
  if (qzIndex >= qzDeck.length) {
    renderQuizSummary();
    return;
  }

  const c = qzDeck[qzIndex];
  qzRevealed = false;

  // Progress
  const pct = (qzIndex / qzDeck.length) * 100;
  document.getElementById('qzPfill').style.width = pct + '%';
  document.getElementById('qzProgText').textContent = `${qzIndex + 1} / ${qzDeck.length}`;
  document.getElementById('qzTitle').textContent = `Quiz — Bucket ${BUCKETS[activeBucket].num}: ${BUCKETS[activeBucket].title}`;

  // Build sentence display — replace ALL ▓ blocks with styled blanks
  let blankCount = 0;
  const sentenceHtml = c.sentence.replace(/▓+/g, () => {
    blankCount++;
    const id = blankCount === 1 ? 'id="qzBlank"' : `id="qzBlank${blankCount}"`;
    return `<span class="qz-blank" ${id} onclick="revealAnswer()"></span>`;
  });

  // Yield class
  const yieldClass = c.yield;
  const yieldLabels = {'very-high':'Very High Yield','high':'High Yield','moderate':'Moderate Yield','low':'Low Yield'};

  const bucketLabel = qzMode === 'wrong' && c.bucketTitle
    ? `${c.bucketTitle} → ${c.topicTitle}`
    : c.topicTitle;

  document.getElementById('qzBody').innerHTML = `
    <div class="qz-card">
      <div class="qz-topic-label">${bucketLabel}</div>
      <div class="qz-yield ${yieldClass}">${yieldLabels[yieldClass] || yieldClass}</div>
      <div class="qz-sentence" id="qzSentence">${sentenceHtml}</div>

      <button class="qz-reveal-btn" id="qzRevealBtn" onclick="revealAnswer()">Show Answer</button>

      <div class="qz-answer-area" id="qzAnswerArea">
        <div class="qz-answer-label">Answer</div>
        <div class="qz-answer-text" id="qzAnswerText"></div>
        ${c.trap ? `<div class="qz-context"><strong style="color:#e07878">⚠ Trap:</strong> ${c.trap}</div>` : ''}
        ${c.hook ? `<div class="qz-context" style="border-left-color:#2a6050;margin-top:8px"><strong style="color:#40d4b8">💡 Hook:</strong> ${c.hook}</div>` : ''}
      </div>

      <div class="qz-ratings" id="qzRatings">
        <button class="qz-rate again" onclick="rateCard('again')">
          <span class="rate-icon">🔴</span>
          <span class="rate-label">Again</span>
          <span class="rate-sub">Didn't know it</span>
        </button>
        <button class="qz-rate hard" onclick="rateCard('hard')">
          <span class="rate-icon">🟡</span>
          <span class="rate-label">Hard</span>
          <span class="rate-sub">Took effort</span>
        </button>
        <button class="qz-rate good" onclick="rateCard('good')">
          <span class="rate-icon">🟢</span>
          <span class="rate-label">Got it</span>
          <span class="rate-sub">Knew it cold</span>
        </button>
      </div>
    </div>`;
  // Init drag on newly rendered card
  requestAnimationFrame(() => {
    const card = document.getElementById('qzBody').querySelector('.qz-card');
    initDrag(card);
  });
}

function revealAnswer() {
  if (qzRevealed) return;
  qzRevealed = true;
  const c = qzDeck[qzIndex];

  // Update ALL blank spans
  document.querySelectorAll('.qz-blank').forEach(blank => {
    blank.textContent = c.answer;
    blank.classList.add('revealed');
  });

  // Show answer area
  document.getElementById('qzAnswerText').textContent = c.answer;
  document.getElementById('qzAnswerArea').classList.add('show');

  // Show ratings, hide reveal btn
  document.getElementById('qzRevealBtn').style.display = 'none';
  document.getElementById('qzRatings').classList.add('show');
}

function rateCard(rating) {
  const c = qzDeck[qzIndex];
  qzStats[rating]++;

  // SRS scheduling
  const now = Date.now();
  let interval, nextDue;
  if (rating === 'again') {
    interval = SRS_AGAIN;
    nextDue = now + SRS_AGAIN * 3600000; // 1 hour — not this session
  } else if (rating === 'hard') {
    interval = SRS_HARD;
    nextDue = now + SRS_HARD * 3600000;
  } else {
    interval = SRS_GOOD;
    nextDue = now + SRS_GOOD * 3600000;
  }
  saveSRS(c.srsKey, { interval, nextDue, lastRating: rating, lastSeen: now });

  qzIndex++;
  saveSession(); // persist progress after every card
  renderQuizCard();
}

function renderQuizSummary() {
  clearSession(qzMode, activeBucket); // session done — clear so next open starts fresh
  const total = qzStats.again + qzStats.hard + qzStats.good;
  const pct = total > 0 ? Math.round((qzStats.good / total) * 100) : 0;
  document.getElementById('qzPfill').style.width = '100%';
  document.getElementById('qzProgText').textContent = 'Done';

  const msg = pct === 100 ? "Perfect session." :
              pct >= 70  ? "Solid — review the reds before next time." :
                           "Keep going — the reds need another pass.";

  document.getElementById('qzBody').innerHTML = `
    <div class="qz-summary">
      <h2>Session Complete</h2>
      <div class="sum-stat">${pct}%</div>
      <div class="sum-sub">${msg}</div>
      <div class="qz-sum-bars">
        <div class="qz-sum-bar"><div class="bar-n again-n">${qzStats.again}</div><div class="bar-l">Again</div></div>
        <div class="qz-sum-bar"><div class="bar-n hard-n">${qzStats.hard}</div><div class="bar-l">Hard</div></div>
        <div class="qz-sum-bar"><div class="bar-n good-n">${qzStats.good}</div><div class="bar-l">Got it</div></div>
      </div>
      <button class="qz-restart" onclick="startQuiz('due')">Review Due Now</button>
      <button class="qz-restart-due" onclick="startQuiz('all')">Restart All Cards</button>
      <p style="font-size:12px;color:#3a4a62;margin-top:16px">Cards marked "Again" will be due in 1 hour.</p>
    </div>`;

  requestAnimationFrame(() => {
    const card = document.getElementById('qzBody').querySelector('.qz-summary');
    initDrag(card);
  });
  updateDueBadge();
}

function updateDueBadge() {
  const b = BUCKETS[activeBucket];
  const now = Date.now();
  let due = 0;
  b.topics.forEach((t, ti) => {
    const cards = makeClozeCards(t, activeBucket, ti);
    cards.forEach(c => {
      const srs = loadSRS(c.srsKey);
      if (!srs || now >= srs.nextDue) due++;
    });
  });
  const badge = document.getElementById('dueBadge');
  if (badge) {
    badge.textContent = due;
    badge.classList.toggle('show', due > 0);
  }
  updateWrongBadge();
}

function getWrongCards() {
  // Collect all Again-rated cards across ALL buckets
  const wrongCards = [];
  const now = Date.now();
  BUCKETS.forEach((b, bIdx) => {
    b.topics.forEach((t, ti) => {
      const cards = makeClozeCards(t, bIdx, ti);
      cards.forEach(c => {
        const srs = loadSRS(c.srsKey);
        if (srs && srs.lastRating === 'again') {
          wrongCards.push({ ...c, bucketTitle: b.title, isDue: now >= srs.nextDue });
        }
      });
    });
  });
  return wrongCards;
}

function updateWrongBadge() {
  const wrong = getWrongCards();
  const due = wrong.filter(c => c.isDue).length;
  const badge = document.getElementById('wrongBadge');
  const btn = document.getElementById('wrongBtn');
  if (badge) {
    badge.textContent = wrong.length;
    badge.classList.toggle('show', wrong.length > 0);
  }
  if (btn) {
    btn.style.display = wrong.length > 0 ? '' : 'none';
  }
}

function startWrongQuiz() {
  const wrongCards = getWrongCards();
  const now = Date.now();

  if (wrongCards.length === 0) {
    alert('No wrong cards yet. Complete a quiz first.');
    return;
  }

  // Separate due and not-yet-due
  const due = wrongCards.filter(c => c.isDue);
  const pending = wrongCards.filter(c => !c.isDue);

  // Show due ones first, then pending
  let deck = [...due, ...pending];

  // Shuffle each group
  for (let i = due.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }

  qzDeck = deck;
  qzIndex = 0;
  qzStats = { again: 0, hard: 0, good: 0 };

  // Override title for this mode
  openQuizOverlay();
  document.getElementById('quizBtn').classList.remove('active');
  document.getElementById('wrongBtn').classList.add('active');
  document.getElementById('qzTitle').textContent = `🔴 Wrong Cards — All Buckets (${deck.length} cards)`;

  // Add bucket label to each card display
  qzMode = 'wrong';
  renderQuizCard();
}

// Update due badge when switching buckets
const _origRenderBucket = renderBucket;

/* ══ THEME ENGINE ══════════════════════════════════════════════════════════ */
function setTheme(t) {
  if (t === 'default') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  localStorage.setItem('pb_theme', t);
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.t === t);
  });
  // Close panel after selection
  document.getElementById('themePanel').classList.remove('open');
}

function toggleThemePanel(e) {
  e.stopPropagation();
  document.getElementById('themePanel').classList.toggle('open');
}

// Close theme panel when clicking elsewhere
document.addEventListener('click', function(e) {
  const panel = document.getElementById('themePanel');
  if (panel && !document.getElementById('themeSwitcher').contains(e.target)) {
    panel.classList.remove('open');
  }
});

(function initTheme() {
  const saved = localStorage.getItem('pb_theme') || 'default';
  setTheme(saved);
})();

// Init
renderSidebar();
renderBucket();
updateDueBadge();
updateWrongBadge();
</script>

</div>

  <div id="qzBody"></div>
</div>
